name: Scheduled CF Pages rebuild

# Fires every 6 hours. Keeps the static site fresh for things that change
# outside the publish-articles flow:
#   - YouTube Shorts thumbnails (baked at build time)
#   - Google News sitemap (48-hour rolling window — stale content drops off)
#   - Homepage episode strip (latest episodes from Supabase)
#   - sameAs / publisher metadata if we edit the brand layer between publishes
#
# Triggers the same dispatch event the publisher uses, via the CF_DEPLOY_HOOK_URL
# secret. CF Pages queues one build regardless of concurrent triggers.

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC every day
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  trigger-rebuild:
    name: Publish scheduled articles & rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Publish scheduled articles
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Supabase secrets not set — skipping auto-publish"
          else
            RESULT=$(curl -s -X POST "${SUPABASE_URL}/rest/v1/rpc/publish_scheduled_articles" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d '{}')
            echo "Auto-published ${RESULT} scheduled article(s)"
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Hit deploy hook
        run: |
          if [ -z "${CF_DEPLOY_HOOK_URL}" ]; then
            echo "::error::CF_DEPLOY_HOOK_URL not set — configure in Settings → Secrets"
            exit 1
          fi
          curl -X POST "${CF_DEPLOY_HOOK_URL}" \
            --fail --silent --show-error --max-time 30
          echo "✓ Cloudflare Pages rebuild queued at $(date -u -Iseconds)"
        env:
          CF_DEPLOY_HOOK_URL: ${{ secrets.CF_DEPLOY_HOOK_URL }}
