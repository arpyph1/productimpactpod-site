name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      # `npm run build` runs prebuild (build:assets via sharp) and then
      # astro build. This catches the full route graph — including getStaticPaths
      # scope bugs, colliding dynamic routes, and missing Supabase columns
      # (the build warns but doesn't fail on Supabase host-not-in-allowlist;
      # CF Pages can reach Supabase at deploy time).
      - name: Build
        env:
          # CI can't reach Supabase (no network access) — the site's query
          # helpers return [] on failure, producing empty listings. These values
          # just need to pass the startup check in supabase.ts.
          # Both are PUBLIC (anon key is RLS-gated) — safe to include here.
          PUBLIC_SUPABASE_URL: https://pgsljoqwfhufubodlqjk.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-key-not-used-at-build-time
        run: npm run build

      - name: Verify key outputs exist
        run: |
          for f in dist/index.html dist/news/index.html dist/podcast/index.html \
                   dist/sitemap.xml dist/sitemap-index.xml dist/sitemap-0.xml \
                   dist/news-sitemap.xml dist/rss.xml \
                   dist/robots.txt dist/favicon.png dist/og-default.png \
                   dist/logo.png dist/about/index.html dist/privacy/index.html \
                   dist/terms/index.html dist/contact/index.html \
                   dist/partnerships/index.html dist/404.html dist/500.html \
                   dist/_redirects dist/topics/index.html \
                   dist/people/index.html dist/themes/index.html \
                   dist/news/archive/index.html; do
            if [ ! -f "$f" ]; then
              echo "::error::Expected build output missing: $f"
              exit 1
            fi
          done
          echo "✓ All required build outputs present"
