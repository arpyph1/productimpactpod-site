<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Master brand mark, 512×512. Scaled down for favicons.
       "PI" monogram built as explicit geometric paths — no fonts,
       clean separation between letters, legible at 16×16. -->
  <defs>
    <linearGradient id="coralGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8566"/>
      <stop offset="100%" stop-color="#ff6b4a"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded square base -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>

  <!-- P: stem (left vertical bar) -->
  <rect x="128" y="128" width="44" height="256" fill="url(#coralGrad)"/>

  <!-- P: bowl — top horizontal + right vertical + bottom horizontal of bowl.
       Constructed as a single closed path to render as a filled D-shape. -->
  <path
    d="M 128 128
       L 234 128
       C 280 128 306 154 306 192
       C 306 230 280 256 234 256
       L 128 256
       Z"
    fill="url(#coralGrad)"
  />
  <!-- Punch out the inner counter of the P bowl -->
  <path
    d="M 172 160
       L 234 160
       C 252 160 262 172 262 192
       C 262 212 252 224 234 224
       L 172 224
       Z"
    fill="#0a0a0a"
  />

  <!-- I: single vertical bar with serif-style top/bottom caps -->
  <rect x="348" y="128" width="44" height="256" fill="url(#coralGrad)"/>
  <rect x="328" y="128" width="84" height="28" fill="url(#coralGrad)"/>
  <rect x="328" y="356" width="84" height="28" fill="url(#coralGrad)"/>
</svg>
