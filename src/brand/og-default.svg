<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628">
  <!-- Default Open Graph card, 1200×628. Used for pages without a hero image. -->

  <defs>
    <linearGradient id="ogCoral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8566"/>
      <stop offset="100%" stop-color="#ff6b4a"/>
    </linearGradient>
    <radialGradient id="ogGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff6b4a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="ogGrid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="#0a0a0a"/>
  <rect width="1200" height="628" fill="url(#ogGrid)"/>
  <rect width="1200" height="628" fill="url(#ogGlow)"/>

  <!-- Top coral accent -->
  <rect width="1200" height="10" fill="url(#ogCoral)"/>

  <!-- Logo mark (144×144 centered near top) -->
  <g transform="translate(528, 136) scale(0.281)">
    <rect width="512" height="512" rx="96" fill="#141414"/>
    <rect x="128" y="128" width="44" height="256" fill="url(#ogCoral)"/>
    <path
      d="M 128 128 L 234 128 C 280 128 306 154 306 192 C 306 230 280 256 234 256 L 128 256 Z"
      fill="url(#ogCoral)"
    />
    <path
      d="M 172 160 L 234 160 C 252 160 262 172 262 192 C 262 212 252 224 234 224 L 172 224 Z"
      fill="#141414"
    />
    <rect x="348" y="128" width="44" height="256" fill="url(#ogCoral)"/>
    <rect x="328" y="128" width="84" height="28" fill="url(#ogCoral)"/>
    <rect x="328" y="356" width="84" height="28" fill="url(#ogCoral)"/>
  </g>

  <!-- Publication name -->
  <text
    x="600"
    y="420"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="64"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-1.5"
  >Product Impact</text>

  <!-- Tagline -->
  <text
    x="600"
    y="476"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#a0a0a0"
    text-anchor="middle"
  >AI product news, releases, and case studies</text>

  <!-- Bottom domain -->
  <text
    x="600"
    y="580"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="600"
    fill="#ff6b4a"
    text-anchor="middle"
    letter-spacing="0.5"
  >productimpactpod.com</text>
</svg>
