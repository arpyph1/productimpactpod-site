<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120">
  <!-- Horizontal logo, 1200×120 (renders to 600×60 for Google News).
       Mark + wordmark. -->
  <rect width="1200" height="120" fill="#0a0a0a"/>

  <defs>
    <linearGradient id="coralGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8566"/>
      <stop offset="100%" stop-color="#ff6b4a"/>
    </linearGradient>
  </defs>

  <!-- Mark, 88×88 on the left -->
  <g transform="translate(16, 16) scale(0.172)">
    <rect width="512" height="512" rx="96" fill="#1a1a1a"/>
    <rect x="128" y="128" width="44" height="256" fill="url(#coralGrad2)"/>
    <path
      d="M 128 128 L 234 128 C 280 128 306 154 306 192 C 306 230 280 256 234 256 L 128 256 Z"
      fill="url(#coralGrad2)"
    />
    <path
      d="M 172 160 L 234 160 C 252 160 262 172 262 192 C 262 212 252 224 234 224 L 172 224 Z"
      fill="#1a1a1a"
    />
    <rect x="348" y="128" width="44" height="256" fill="url(#coralGrad2)"/>
    <rect x="328" y="128" width="84" height="28" fill="url(#coralGrad2)"/>
    <rect x="328" y="356" width="84" height="28" fill="url(#coralGrad2)"/>
  </g>

  <!-- Wordmark -->
  <text
    x="120"
    y="76"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="48"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-1"
  >Product Impact</text>
</svg>
